<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutch-English Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Dutch <i class="fas fa-arrow-right mx-2 text-sm"></i> English</h1>
            <p class="text-indigo-100 text-sm">Real-time translation & pronunciation</p>
        </div>

        <div class="grid md:grid-cols-2 gap-0 divide-x divide-gray-100">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold text-gray-700 uppercase text-xs tracking-wider">Dutch</span>
                    <button onclick="speak('dutch')" class="text-indigo-600 hover:bg-indigo-50 p-2 rounded-full transition">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <textarea id="sourceText" placeholder="Typ hier iets..." 
                    class="w-full h-40 resize-none border-none focus:ring-0 text-lg text-gray-800 placeholder-gray-300"></textarea>
            </div>

            <div class="p-6 bg-gray-50">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold text-gray-700 uppercase text-xs tracking-wider">English</span>
                    <button onclick="speak('english')" class="text-indigo-600 hover:bg-indigo-50 p-2 rounded-full transition">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div id="targetText" class="w-full h-40 text-lg text-gray-800 italic">
                    Translation will appear here...
                </div>
            </div>
        </div>

        <div class="p-4 bg-gray-100 border-t border-gray-200 flex justify-end">
            <button onclick="handleTranslate()" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2 rounded-lg font-medium transition shadow-md">
                Translate
            </button>
        </div>
    </div>

    <script>
        // --- TRANSLATION LOGIC ---
        async function handleTranslate() {
            const text = document.getElementById('sourceText').value;
            const outputDiv = document.getElementById('targetText');

            if (!text.trim()) return;

            outputDiv.innerText = "Translating...";

            try {
                // NOTE: Using a free MyMemory API for demonstration. 
                // For production, use Google Translate API or DeepL API.
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=nl|en`);
                const data = await response.json();
                
                outputDiv.innerText = data.responseData.translatedText;
                outputDiv.classList.remove('italic', 'text-gray-400');
            } catch (error) {
                outputDiv.innerText = "Error: Could not reach translation server.";
            }
        }

        // --- PRONUNCIATION LOGIC ---
        function speak(language) {
            const text = language === 'dutch' 
                ? document.getElementById('sourceText').value 
                : document.getElementById('targetText').innerText;

            if (!text || text.includes("Translation will appear")) return;

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Set locale
            utterance.lang = language === 'dutch' ? 'nl-NL' : 'en-US';
            
            // Optional: Adjust pitch and rate
            utterance.rate = 0.9; 
            
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
