<aside class="w-full md:w-60 bg-white border-r border-slate-100 p-4 sticky top-[80px] h-fit">
    <nav class="flex flex-col gap-4">
        <button onclick="changeMode('saved')" id="nav-saved" class="w-full p-3 rounded-xl text-xs font-bold flex items-center gap-3 active-nav transition-all"><i class="fas fa-layer-group"></i> My Deck</button>
        <button onclick="changeMode('a2')" id="nav-a2" class="w-full p-3 rounded-xl text-xs font-bold flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-all"><i class="fas fa-graduation-cap text-indigo-500"></i> A2 & KNM List</button>
        <button onclick="changeMode('revisit')" id="nav-revisit" class="w-full p-3 rounded-xl text-xs font-bold flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-all"><i class="fas fa-star text-amber-500"></i> Revisit List</button>
        
        <div class="pt-4 border-t border-slate-100">
            <label class="text-[10px] font-bold text-slate-400 uppercase block mb-3 tracking-widest">Flashcard Filter</label>
            <div id="categoryGrid" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div class="pt-4 border-t border-slate-100">
            <label class="text-[10px] font-bold text-slate-400 uppercase block mb-3 tracking-widest">Quizlet Chapters</label>
            <div id="chapterGrid" class="grid grid-cols-4 gap-1.5"></div>
        </div>
    </nav>
</aside>

<script>
    // 1. Data Definitions
    const ocrFullDatabase = [
        {nl: "de overheid", en: "the government", cat: "Politics"},
        {nl: "de belasting", en: "the tax", cat: "Work"},
        {nl: "de zorgverzekering", en: "health insurance", cat: "Health"},
        {nl: "de huisarts", en: "family doctor", cat: "Health"},
        {nl: "de grondwet", en: "constitution", cat: "Politics"},
        {nl: "de verkiezingen", en: "elections", cat: "Politics"},
        {nl: "de gemeente", en: "municipality", cat: "Politics"},
        {nl: "het salaris", en: "salary", cat: "Work"},
        {nl: "de sollicitatie", en: "job application", cat: "Work"},
        {nl: "de kollega", en: "colleague", cat: "Work"},
        {nl: "de basisschool", en: "primary school", cat: "Education"},
        {nl: "het diploma", en: "diploma", cat: "Education"},
        {nl: "de buren", en: "neighbors", cat: "Daily Life"},
        {nl: "het verkeer", en: "traffic", cat: "Daily Life"},
        {nl: "de huur", en: "rent", cat: "Housing"},
        {nl: "de makelaar", en: "real estate agent", cat: "Housing"},
        {nl: "de inburgering", en: "civic integration", cat: "Culture"},
        {nl: "de normen", en: "standards / norms", cat: "Culture"}
    ].map(w => ({...w, revisit: false}));

    const chapterData = { 1: "218836453", 2: "218836670", 3: "218836794", 4: "218837040", 5: "218837082", 6: "218837677", 7: "218837982", 8: "218838021", 9: "218838194", 10: "218838247", 11: "218838318", 12: "218838753", 13: "218838787", 14: "218839448", 15: "218840442", 16: "218840728", 17: "218840757", 18: "218841206" };
    const categories = ["All", "Daily Life", "Work", "Politics", "Health", "Education", "Housing", "Culture"];

    let myDeck = JSON.parse(localStorage.getItem('myWords')) || [];
    let currentMode = 'a2', currentIdx = 0, isNlToEn = true, currentCategory = 'All';

    // 2. Initializers
    function initUI() {
        // Build Category Filter Buttons
        const catGrid = document.getElementById('categoryGrid');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.id = `cat-${cat.replace(/\s/g, '')}`;
            btn.className = "h-9 rounded-lg text-[9px] font-bold bg-white border border-slate-100 hover:border-indigo-300 transition-all text-slate-500 shadow-sm";
            btn.innerText = cat;
            btn.onclick = () => { currentCategory = cat; changeMode('a2'); updateCatUI(); };
            catGrid.appendChild(btn);
        });

        // Build 18 Chapters Grid
        const chapGrid = document.getElementById('chapterGrid');
        for(let i=1; i<=18; i++) {
            const btn = document.createElement('button');
            btn.className = "h-8 rounded-lg text-[10px] font-bold bg-white border border-slate-100 hover:border-indigo-300 transition-all text-slate-500 shadow-sm";
            btn.innerText = i;
            btn.onclick = () => window.open(`https://quizlet.com/${chapterData[i]}/flashcards`, '_blank');
            chapGrid.appendChild(btn);
        }
        updateCatUI();
        updateUI();
    }

    // 3. Core Logic (Filtering & Display)
    function updateCatUI() {
        categories.forEach(cat => {
            const btn = document.getElementById(`cat-${cat.replace(/\s/g, '')}`);
            if(currentCategory === cat) btn.classList.add('cat-btn-active');
            else btn.classList.remove('cat-btn-active');
        });
    }

    function changeMode(mode) { 
        currentMode = mode; currentIdx = 0; 
        document.querySelectorAll('nav > button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('nav-' + mode).classList.add('active-nav');
        updateUI(); 
    }

    function getActiveList() { 
        let list = currentMode === 'saved' ? myDeck : (currentMode === 'a2' ? ocrFullDatabase : myDeck.concat(ocrFullDatabase).filter(w => w.revisit));
        if(currentMode === 'a2' && currentCategory !== 'All') {
            return list.filter(w => w.cat === currentCategory);
        }
        return list;
    }

    function updateUI() {
        const list = getActiveList();
        const flashFront = document.getElementById('flashFront');
        const flashBack = document.getElementById('flashBack');
        
        if(!list.length) {
            flashFront.innerText = "Empty List";
            flashBack.innerText = "Add words or change category";
            return;
        }
        const word = list[currentIdx];
        flashFront.innerText = word.nl;
        flashBack.innerText = word.en;
        document.getElementById('deckLabel').innerText = word.cat ? `KNM: ${word.cat}` : (currentMode === 'saved' ? 'My Deck' : 'Revisit');
        document.querySelectorAll('.cardCountUI').forEach(el => el.innerText = `${currentIdx + 1}/${list.length}`);
        document.getElementById('cardInner').classList.remove('flipped');
        word.revisit ? document.getElementById('revisitBtn').classList.add('revisit-active') : document.getElementById('revisitBtn').classList.remove('revisit-active');
    }

    // 4. Utilities (Speech, Navigation, Storage)
    function speakText(text, lang) {
        if(!text || text === "...") return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const langCode = lang === 'nl' ? 'nl-NL' : 'en-US';
        const fVoice = voices.find(v => v.lang.includes(langCode) && (v.name.includes('Female') || v.name.includes('Google'))) || voices.find(v => v.lang.includes(langCode));
        if(fVoice) u.voice = fVoice;
        u.pitch = 1.2; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    function nextCard() { const l = getActiveList(); if(l.length) { currentIdx = (currentIdx + 1) % l.length; updateUI(); } }
    function prevCard() { const l = getActiveList(); if(l.length) { currentIdx = (currentIdx - 1 + l.length) % l.length; updateUI(); } }

    function toggleRevisit() {
        const list = getActiveList();
        if(list.length) {
            list[currentIdx].revisit = !list[currentIdx].revisit;
            localStorage.setItem('myWords', JSON.stringify(myDeck));
            updateUI();
        }
    }

    function deleteCurrentWord() {
        if(currentMode === 'a2') return alert("Cannot delete preset words");
        if(myDeck.length) {
            myDeck.splice(currentIdx, 1);
            localStorage.setItem('myWords', JSON.stringify(myDeck));
            currentIdx = 0; updateUI();
        }
    }

    async function debounceTranslate() {
        clearTimeout(window.tTimer);
        window.tTimer = setTimeout(async () => {
            const text = document.getElementById('sourceText').value.trim();
            if(!text) return;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${isNlToEn?'nl':'en'}&tl=${isNlToEn?'en':'nl'}&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const res = await fetch(url); const data = await res.json();
                const trans = data[0][0][0];
                document.getElementById('targetText').innerText = trans;
                if(!myDeck.some(w => w.nl === (isNlToEn?text:trans).toLowerCase())) {
                    myDeck.unshift({ nl: (isNlToEn?text:trans).toLowerCase(), en: (isNlToEn?trans:text), revisit: false });
                    localStorage.setItem('myWords', JSON.stringify(myDeck));
                }
            } catch(e) {}
        }, 700);
    }

    function swapLanguages() { 
        isNlToEn = !isNlToEn; 
        document.getElementById('label-source').innerText = isNlToEn ? 'NL' : 'EN'; 
        document.getElementById('label-target').innerText = isNlToEn ? 'EN' : 'NL'; 
    }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    initUI();
</script>
