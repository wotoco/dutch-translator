<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Dutch Everyday - A2 Exam Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .active-nav { background: #4f46e5 !important; color: white !important; font-weight: 700; }
        .card-inner { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; border-radius: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .card-back { transform: rotateY(180deg); background: #4f46e5; color: white; }
        .inner-counter { position: absolute; bottom: 1.5rem; right: 1.5rem; font-size: 0.75rem; font-weight: 800; padding: 0.25rem 0.75rem; border-radius: 1rem; background: rgba(0, 0, 0, 0.05); color: #94a3b8; }
        .card-back .inner-counter { background: rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.8); }
        .search-row { height: 56px; border: 1px solid #e2e8f0; }
        .search-row:focus-within { border-color: #4f46e5; }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto p-4 flex flex-col items-center gap-6">
            <div class="flex flex-col items-center gap-1">
                <span class="text-4xl">🇳🇱</span>
                <h1 class="text-2xl font-black tracking-tighter italic text-slate-800">Dutch<span class="text-indigo-600">Everyday</span></h1>
            </div>

            <div class="w-full flex flex-col md:flex-row items-center gap-3">
                <div class="flex-1 w-full flex items-center bg-slate-50 rounded-xl px-4 search-row transition-all">
                    <span class="text-[10px] font-black text-slate-400 uppercase mr-3">Dict</span>
                    <input type="text" id="sourceText" oninput="debounceTranslate()" placeholder="Search word or verb..." class="bg-transparent border-none focus:ring-0 text-base font-semibold w-full outline-none">
                    <button onclick="speakText(document.getElementById('sourceText').value, isNlToEn ? 'nl' : 'en')" class="text-slate-400 hover:text-indigo-600 p-2"><i class="fas fa-volume-up"></i></button>
                </div>
                <button onclick="swapLanguages()" class="bg-white border w-12 h-12 rounded-full flex items-center justify-center text-indigo-600 hover:shadow-md transition-all active:scale-90"><i class="fas fa-exchange-alt"></i></button>
                <div class="flex-1 w-full flex items-center bg-indigo-50/50 rounded-xl px-4 border border-indigo-100 search-row">
                    <span class="text-[10px] font-black text-indigo-400 uppercase mr-3">Eng</span>
                    <div id="targetText" class="text-indigo-700 font-bold text-base italic truncate w-full">...</div>
                    <button onclick="speakText(document.getElementById('targetText').innerText, isNlToEn ? 'en' : 'nl')" class="text-indigo-300 hover:text-indigo-600 p-2"><i class="fas fa-volume-up"></i></button>
                    <i class="fas fa-check-circle text-indigo-400 text-sm ml-1 opacity-0 transition-opacity" id="saveIndicator"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-64 bg-white border-r border-slate-100 p-6 sticky top-[180px] h-fit">
            <nav class="flex flex-col gap-6">
                <div class="bg-indigo-600 rounded-2xl p-5 text-white shadow-lg shadow-indigo-200">
                    <label class="text-[10px] font-bold text-indigo-200 uppercase tracking-widest block mb-2">Total Goal (2 mo)</label>
                    <div class="text-3xl font-black mb-1"><span id="totalSavedCount">0</span> <span class="text-indigo-300 text-sm font-medium">/ 2000</span></div>
                    <div class="w-full bg-indigo-800 h-1.5 rounded-full overflow-hidden">
                        <div id="goalProgressBar" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <button onclick="showSaved()" id="nav-saved" class="w-full p-3 rounded-xl text-sm font-bold flex items-center gap-3 active-nav"><i class="fas fa-layer-group w-5"></i> My Deck</button>
                    <button onclick="showA2()" id="nav-a2" class="w-full p-3 rounded-xl text-sm font-bold flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-all">
                        <i class="fas fa-graduation-cap w-5 text-indigo-500"></i> A2 Vocab List
                    </button>
                    <button onclick="showStats()" id="nav-stats" class="w-full p-3 rounded-xl text-sm font-bold flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-all"><i class="fas fa-chart-line w-5"></i> Study Chart</button>
                </div>

                <div class="pt-4 border-t border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-4 italic">Textbook Chapters</label>
                    <div id="chapterGrid" class="grid grid-cols-4 gap-2"></div>
                </div>
            </nav>
        </aside>

        <main class="flex-grow p-6 lg:p-10">
            <div id="conjugationBox" class="hidden mb-10 bg-white rounded-3xl p-6 border border-slate-200 shadow-sm animate-fade-in">
                <h3 class="font-bold text-sm flex items-center gap-2 text-slate-800 uppercase tracking-tight mb-6">
                    <i class="fas fa-book-open text-indigo-500"></i> Verb Conjugation
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div><p class="text-[10px] font-extrabold text-slate-400 mb-4 uppercase tracking-widest">Present (OTT)</p><div id="presTense" class="space-y-2"></div></div>
                    <div><p class="text-[10px] font-extrabold text-slate-400 mb-4 uppercase tracking-widest">Past (OVT)</p><div id="pastTense" class="space-y-2"></div></div>
                </div>
            </div>

            <div id="savedSection">
                <div class="relative max-w-xl mx-auto h-96 mb-10">
                    <button onclick="deleteCurrentWord()" class="absolute -top-3 -right-3 z-10 bg-white border border-slate-200 text-red-500 w-10 h-10 rounded-full shadow-md flex items-center justify-center hover:bg-red-50 transition-all"><i class="fas fa-trash-alt"></i></button>
                    <div class="w-full h-full cursor-pointer" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                        <div id="cardInner" class="card-inner w-full h-full relative">
                            <div class="card-front bg-white shadow-xl">
                                <div id="a2Badge" class="hidden absolute top-6 left-6 bg-indigo-100 text-indigo-600 text-[10px] font-black px-3 py-1 rounded-full tracking-widest uppercase">A2 Exam Core</div>
                                <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-6">Dutch Word</span>
                                <p id="flashFront" class="text-4xl font-extrabold text-slate-800">...</p>
                                <button onclick="event.stopPropagation(); speakText(document.getElementById('flashFront').innerText, 'nl')" class="mt-8 w-14 h-14 rounded-full bg-slate-50 text-indigo-500 flex items-center justify-center hover:bg-indigo-100 transition-all shadow-sm"><i class="fas fa-volume-up text-lg"></i></button>
                                <div class="inner-counter"><span class="cardCountUI">0/0</span></div>
                            </div>
                            <div class="card-back shadow-xl shadow-indigo-100">
                                <span class="text-[10px] font-bold text-indigo-200 uppercase tracking-widest mb-6">Translation</span>
                                <p id="flashBack" class="text-4xl font-bold italic">...</p>
                                <button onclick="event.stopPropagation(); speakText(document.getElementById('flashBack').innerText, 'en')" class="mt-8 w-14 h-14 rounded-full bg-white/20 text-white flex items-center justify-center hover:bg-white/30 transition-all shadow-sm"><i class="fas fa-volume-up text-lg"></i></button>
                                <div class="inner-counter"><span class="cardCountUI">0/0</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center gap-12">
                    <button onclick="prevCard()" class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-indigo-600 shadow-sm transition-all"><i class="fas fa-chevron-left fa-xl"></i></button>
                    <button onclick="nextCard()" class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-indigo-600 shadow-sm transition-all"><i class="fas fa-chevron-right fa-xl"></i></button>
                </div>
            </div>

            <div id="statsSection" class="hidden animate-fade-in">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">Daily Progress Chart</h2>
                    <div class="text-xs font-bold text-slate-400 uppercase">Goal: 2000 Words in 60 Days</div>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm h-[450px]">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script>
        // OFFICIAL A2 LIST (Samples - Expand this list with all 1200 words)
        const a2VocabList = [
            {nl: "afspraak", en: "appointment"}, {nl: "belangrijk", en: "important"}, {nl: "begrijpen", en: "to understand"},
            {nl: "boodschappen", en: "groceries"}, {nl: "buurman", en: "neighbor"}, {nl: "ervaring", en: "experience"},
            {nl: "gebeuren", en: "to happen"}, {nl: "gezondheid", en: "health"}, {nl: "hoeveelheid", en: "quantity"},
            {nl: "onderwijs", en: "education"}, {nl: "overleg", en: "consultation"}, {nl: "rekening", en: "bill/invoice"}
        ];

        const chapterData = { 1: "218836453", 2: "218836670", 3: "218836794", 4: "218837040", 5: "218837082", 6: "218837677", 7: "218837982", 8: "218838021", 9: "218838194", 10: "218838247", 11: "218838318", 12: "218838753", 13: "218838787", 14: "218839448", 15: "218840442", 16: "218840728", 17: "218840757", 18: "218841206" };
        let savedWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let currentIdx = 0; let isNlToEn = true; let isA2Mode = false;

        const grid = document.getElementById('chapterGrid');
        for(let i=1; i<=18; i++) {
            const btn = document.createElement('button');
            btn.className = "h-10 rounded-lg text-xs font-bold bg-white border border-slate-100 hover:border-indigo-300 transition-all text-slate-500";
            btn.innerText = i; btn.onclick = () => window.open(`https://quizlet.com/${chapterData[i]}/flashcards`, '_blank');
            grid.appendChild(btn);
        }

        function switchView(viewId) {
            ['savedSection', 'statsSection'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        }

        function showSaved() {
            isA2Mode = false;
            document.getElementById('a2Badge').classList.add('hidden');
            switchView('savedSection');
            document.getElementById('nav-saved').classList.add('active-nav');
            updateSavedUI();
        }

        function showA2() {
            isA2Mode = true;
            document.getElementById('a2Badge').classList.remove('hidden');
            switchView('savedSection');
            document.getElementById('nav-a2').classList.add('active-nav');
            currentIdx = 0;
            updateSavedUI();
        }

        function showStats() {
            switchView('statsSection');
            document.getElementById('nav-stats').classList.add('active-nav');
            initChart();
        }

        function updateSavedUI() {
            const list = isA2Mode ? a2VocabList : savedWords;
            const count = list.length;
            document.getElementById('totalSavedCount').innerText = savedWords.length;
            document.getElementById('goalProgressBar').style.width = Math.min((savedWords.length / 2000 * 100), 100) + '%';
            
            const cardCounter = document.querySelectorAll('.cardCountUI');
            if(count === 0) {
                document.getElementById('flashFront').innerText = "Deck Empty";
                document.getElementById('flashBack').innerText = "Start searching!";
                cardCounter.forEach(el => el.innerText = "0/0"); return;
            }
            const word = list[currentIdx];
            document.getElementById('flashFront').innerText = word.nl;
            document.getElementById('flashBack').innerText = word.en;
            cardCounter.forEach(el => el.innerText = `${currentIdx + 1}/${count}`);
            document.getElementById('cardInner').classList.remove('flipped');
        }

        function debounceTranslate() {
            const text = document.getElementById('sourceText').value.trim();
            if(!text) return;
            // ... (keep previous translate logic, but add save to savedWords)
            // ensure words are saved with {nl, en, date: new Date().toLocaleDateString()}
        }

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const labels = Array.from({length: 30}, (_, i) => `Day ${i+1}`);
            const goalData = labels.map((_, i) => (2000/60) * i);
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Words Mastered',
                        data: [10, 25, 45, 80, 120, 150], // Replace with real cumulative daily counts
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true, tension: 0.4
                    }, {
                        label: 'Goal Pace',
                        data: goalData,
                        borderColor: '#e2e8f0',
                        borderDash: [5, 5], tension: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function speakText(text, lang) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const filter = lang === 'nl' ? 'nl-NL' : 'en-US';
            const fVoice = voices.find(v => v.lang.startsWith(filter) && v.name.includes('Female'));
            if(fVoice) u.voice = fVoice;
            u.pitch = 1.2; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function nextCard() { 
            const list = isA2Mode ? a2VocabList : savedWords;
            if(currentIdx < list.length - 1) { currentIdx++; updateSavedUI(); } 
        }
        function prevCard() { 
            if(currentIdx > 0) { currentIdx--; updateSavedUI(); } 
        }

        showSaved();
    </script>
</body>
</html>
