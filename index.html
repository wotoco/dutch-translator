<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dutch-English Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold italic tracking-tight">Dutch <i class="fas fa-bolt mx-1 text-yellow-300"></i> English</h1>
            <p class="text-indigo-100 text-sm opacity-80">Instant translation & clear pronunciation</p>
        </div>

        <div class="grid md:grid-cols-2 gap-0 divide-y md:divide-y-0 md:divide-x divide-gray-100">
            <div class="p-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-400 uppercase text-xs">Dutch</span>
                    <button onclick="speak('nl-NL')" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 w-10 h-10 rounded-full transition flex items-center justify-center">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <textarea id="sourceText" oninput="debounceTranslate()" placeholder="Typ hier..." 
                    class="w-full h-40 resize-none border-none focus:ring-0 text-xl text-gray-800 placeholder-gray-300"></textarea>
            </div>

            <div class="p-8 bg-gray-50/50">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-400 uppercase text-xs">English</span>
                    <button onclick="speak('en-US')" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 w-10 h-10 rounded-full transition flex items-center justify-center">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div id="targetText" class="w-full h-40 text-xl text-gray-800 font-medium"></div>
            </div>
        </div>
    </div>

    <script>
        let typingTimer;
        const doneTypingInterval = 400; 

        // 1. Instant Translation Logic
        function debounceTranslate() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(performTranslation, doneTypingInterval);
        }

        async function performTranslation() {
            const text = document.getElementById('sourceText').value;
            const outputDiv = document.getElementById('targetText');

            if (!text.trim()) {
                outputDiv.innerText = "";
                return;
            }

            try {
                // Using MyMemory API for the translation
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=nl|en`);
                const data = await response.json();
                outputDiv.innerText = data.responseData.translatedText;
            } catch (error) {
                console.error("Translation failed");
            }
        }

        // 2. Fixed Pronunciation Logic (Web Speech API)
        function speak(langCode) {
            const sourceText = document.getElementById('sourceText').value;
            const targetText = document.getElementById('targetText').innerText;
            const textToSay = (langCode === 'nl-NL') ? sourceText : targetText;

            if (!textToSay || textToSay === "") return;

            // Stop any current speaking
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = langCode;
            utterance.rate = 0.9; // Slightly slower for clarity
            utterance.pitch = 1;

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
