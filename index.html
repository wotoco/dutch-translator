<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Dutch Everyday - OCR A2 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .active-nav { background: #4f46e5 !important; color: white !important; font-weight: 700; }
        .card-inner { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; height: 100%; width: 100%; }
        .flipped { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; border-radius: 2.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .card-back { transform: rotateY(180deg); background: #4f46e5; color: white; }
        .inner-nav { position: absolute; top: 0; bottom: 0; width: 60px; display: flex; align-items: center; justify-content: center; z-index: 20; color: #cbd5e1; transition: color 0.2s; cursor: pointer; }
        .inner-nav:hover { color: #4f46e5; }
        .card-back .inner-nav:hover { color: white; }
        .search-row { height: 50px; border: 1px solid #e2e8f0; }
        .revisit-active { color: #f59e0b !important; }
        .conj-item { display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding: 5px 0; align-items: center; font-size: 0.75rem; }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm p-3">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-4">
            <div class="flex items-center gap-2 self-start md:self-center shrink-0">
                <span class="text-2xl">🇳🇱</span>
                <h1 class="text-lg font-black tracking-tighter italic text-slate-800">Dutch<span class="text-indigo-600">Everyday</span></h1>
            </div>

            <div class="w-full flex flex-col md:flex-row items-center gap-2 flex-grow">
                <div class="flex-1 w-full flex items-center bg-slate-50 rounded-xl px-3 search-row">
                    <span class="text-[9px] font-black text-slate-400 uppercase mr-2">NL</span>
                    <input type="text" id="sourceText" oninput="debounceTranslate()" placeholder="Search word..." class="bg-transparent border-none focus:ring-0 text-sm font-semibold w-full outline-none">
                    <button onclick="speakCorrectly(document.getElementById('sourceText').value, isNlToEn ? 'nl' : 'en')" class="text-slate-300 hover:text-indigo-600 px-2"><i class="fas fa-volume-up"></i></button>
                </div>
                <button onclick="swapLanguages()" class="hidden md:flex bg-white border w-10 h-10 rounded-full items-center justify-center text-indigo-600 active:scale-90 transition-all"><i class="fas fa-exchange-alt text-xs"></i></button>
                <div class="flex-1 w-full flex items-center bg-indigo-50/50 rounded-xl px-3 border border-indigo-100 search-row">
                    <span class="text-[9px] font-black text-indigo-400 uppercase mr-2">EN</span>
                    <div id="targetText" class="text-indigo-700 font-bold text-sm italic truncate w-full">...</div>
                    <button onclick="speakCorrectly(document.getElementById('targetText').innerText, isNlToEn ? 'en' : 'nl')" class="text-indigo-300 hover:text-indigo-600 px-2"><i class="fas fa-volume-up"></i></button>
                </div>
            </div>

            <button onclick="toggleConj()" id="conjToggleBtn" class="hidden md:flex bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-slate-200 transition">
                <i class="fas fa-book-open mr-2"></i> Verb Conjugation
            </button>
        </div>
        
        <div id="conjugationBox" class="hidden max-w-7xl mx-auto mt-2 p-4 bg-white border-x border-b rounded-b-2xl shadow-inner animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <p class="text-[9px] font-black text-indigo-500 uppercase mb-2 tracking-widest">Present (Ik/Jij/Hij/Wij/Jullie/Zij)</p>
                    <div id="presTense" class="space-y-0.5"></div>
                </div>
                <div>
                    <p class="text-[9px] font-black text-indigo-500 uppercase mb-2 tracking-widest">Past (OVT)</p>
                    <div id="pastTense" class="space-y-0.5"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-56 bg-white border-r border-slate-100 p-4 sticky top-[80px] h-fit">
            <nav class="flex flex-col gap-4">
                <button onclick="changeMode('saved')" id="nav-saved" class="w-full p-3 rounded-xl text-xs font-bold flex items-center gap-3 active-nav transition-all"><i class="fas fa-layer-group"></i> My Deck</button>
                <button onclick="changeMode('a2')" id="nav-a2" class="w-full p-3 rounded-xl text-xs font-bold flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-all"><i class="fas fa-graduation-cap"></i> OCR A2 List</button>
                <button onclick="changeMode('revisit')" id="nav-revisit" class="w-full p-3 rounded-xl text-xs font-bold flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-all"><i class="fas fa-star text-amber-500"></i> Revisit List</button>
                <div class="pt-4 border-t border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-3">Chapters</label>
                    <div id="chapterGrid" class="grid grid-cols-4 gap-1.5"></div>
                </div>
            </nav>
        </aside>

        <main class="flex-grow p-4 lg:p-10 flex flex-col items-center">
            <div id="deckArea" class="w-full max-w-xl relative">
                <button onclick="toggleRevisit()" id="revisitBtn" class="absolute -top-3 left-4 z-30 bg-white border border-slate-200 text-slate-300 w-10 h-10 rounded-full shadow-md flex items-center justify-center"><i class="fas fa-star"></i></button>
                <button onclick="deleteCurrentWord()" class="absolute -top-3 right-4 z-30 bg-white border border-slate-200 text-red-400 w-10 h-10 rounded-full shadow-md flex items-center justify-center"><i class="fas fa-trash-alt text-xs"></i></button>

                <div class="relative h-80 w-full">
                    <div class="inner-nav left-0 rounded-l-2xl" onclick="prevCard()"><i class="fas fa-chevron-left"></i></div>
                    <div class="inner-nav right-0 rounded-r-2xl" onclick="nextCard()"><i class="fas fa-chevron-right"></i></div>

                    <div class="w-full h-full cursor-pointer" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                        <div id="cardInner" class="card-inner relative">
                            <div class="card-face bg-white shadow-xl">
                                <p id="flashFront" class="text-3xl font-extrabold text-slate-800">...</p>
                                <button onclick="event.stopPropagation(); speakCorrectly(document.getElementById('flashFront').innerText, 'nl')" class="mt-6 w-12 h-12 rounded-full bg-slate-50 text-indigo-500 flex items-center justify-center shadow-sm"><i class="fas fa-volume-up"></i></button>
                                <div class="absolute bottom-6 right-8 text-[10px] font-bold text-slate-300 cardCountUI">0/0</div>
                            </div>
                            <div class="card-face card-back shadow-xl">
                                <p id="flashBack" class="text-3xl font-bold italic">...</p>
                                <button onclick="event.stopPropagation(); speakCorrectly(document.getElementById('flashBack').innerText, 'en')" class="mt-6 w-12 h-12 rounded-full bg-white/20 text-white flex items-center justify-center shadow-sm hover:bg-white/30"><i class="fas fa-volume-up"></i></button>
                                <div class="absolute bottom-6 right-8 text-[10px] font-bold text-indigo-200 cardCountUI">0/0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // OCR A2 VOCABULARY DATABASE
        const a2List = [
            {nl: "afspraak", en: "appointment"}, {nl: "belangrijk", en: "important"}, {nl: "begrijpen", en: "understand"},
            {nl: "boodschappen", en: "groceries"}, {nl: "buurman", en: "neighbor"}, {nl: "gezondheid", en: "health"},
            {nl: "ervaring", en: "experience"}, {nl: "toekomst", en: "future"}, {nl: "rekening", en: "bill"},
            {nl: "overheid", en: "government"}, {nl: "vrijheid", en: "freedom"}, {nl: "onderwijs", en: "education"},
            {nl: "omgeving", en: "environment"}, {nl: "gebeuren", en: "to happen"}, {nl: "verwachten", en: "to expect"},
            {nl: "verleden", en: "past"}, {nl: "tegenwoordig", en: "present/nowadays"}, {nl: "misschien", en: "maybe"}
        ].map(w => ({...w, revisit: false}));

        let myDeck = JSON.parse(localStorage.getItem('myWords')) || [];
        let currentMode = 'saved', currentIdx = 0, isNlToEn = true;

        // FORCED FEMALE VOICE USING GOOGLE TRANSLATE API SOURCE
        function speakCorrectly(text, lang) {
            if(!text || text === "...") return;
            const googleTTSUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;
            const audio = new Audio(googleTTSUrl);
            audio.play();
        }

        function toggleConj() { document.getElementById('conjugationBox').classList.toggle('hidden'); }

        function conjugate(text) {
            if(!isNlToEn || text.length < 3) return;
            document.getElementById('conjToggleBtn').classList.remove('hidden');
            let stem = text.endsWith('en') ? text.slice(0, -2) : text;
            let inf = text.endsWith('en') ? text : text + 'en';

            const ott = [
                {p: 'Ik', v: stem}, {p: 'Jij/Je/U', v: stem+'t'}, {p: 'Hij/Zij/Het', v: stem+'t'},
                {p: 'Wij/We', v: inf}, {p: 'Jullie', v: inf}, {p: 'Zij', v: inf}
            ];
            const ovt = [
                {p: 'Ik', v: stem+'te'}, {p: 'Jij/Je/U', v: stem+'te'}, {p: 'Hij/Zij/Het', v: stem+'te'},
                {p: 'Wij/We', v: stem+'ten'}, {p: 'Jullie', v: stem+'ten'}, {p: 'Zij', v: stem+'ten'}
            ];

            const build = (arr) => arr.map(i => `<div class="conj-item"><span>${i.p} <b class="text-indigo-600">${i.v}</b></span><i class="fas fa-volume-up text-slate-300 cursor-pointer p-1 hover:text-indigo-600" onclick="speakCorrectly('${i.p} ${i.v}', 'nl')"></i></div>`).join('');
            document.getElementById('presTense').innerHTML = build(ott);
            document.getElementById('pastTense').innerHTML = build(ovt);
        }

        function debounceTranslate() {
            clearTimeout(window.tTimer);
            window.tTimer = setTimeout(async () => {
                const text = document.getElementById('sourceText').value.trim();
                if(!text) return;
                const sl = isNlToEn ? 'nl' : 'en', tl = isNlToEn ? 'en' : 'nl';
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
                try {
                    const res = await fetch(url); const data = await res.json();
                    const trans = data[0][0][0]; 
                    document.getElementById('targetText').innerText = trans;
                    const nlVal = (isNlToEn ? text : trans).toLowerCase().trim();
                    if(!myDeck.some(w => w.nl === nlVal)) {
                        myDeck.unshift({ nl: nlVal, en: (isNlToEn ? trans : text), revisit: false });
                        localStorage.setItem('myWords', JSON.stringify(myDeck));
                        updateUI();
                    }
                    if(isNlToEn) conjugate(nlVal);
                } catch(e) {}
            }, 700);
        }

        const chapterData = { 1: "218836453", 2: "218836670", 3: "218836794", 4: "218837040", 5: "218837082", 6: "218837677", 7: "218837982", 8: "218838021", 9: "218838194", 10: "218838247", 11: "218838318", 12: "218838753", 13: "218838787", 14: "218839448", 15: "218840442", 16: "218840728", 17: "218840757", 18: "218841206" };
        const grid = document.getElementById('chapterGrid');
        for(let i=1; i<=18; i++) {
            const btn = document.createElement('button');
            btn.className = "h-9 rounded-lg text-[10px] font-bold bg-white border border-slate-100 hover:border-indigo-300 transition-all text-slate-500 shadow-sm";
            btn.innerText = i; btn.onclick = () => window.open(`https://quizlet.com/${chapterData[i]}/flashcards`, '_blank');
            grid.appendChild(btn);
        }

        function swapLanguages() { isNlToEn = !isNlToEn; document.getElementById('label-source').innerText = isNlToEn ? 'NL' : 'EN'; document.getElementById('label-target').innerText = isNlToEn ? 'EN' : 'NL'; }
        function changeMode(mode) { currentMode = mode; currentIdx = 0; document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav')); document.getElementById('nav-' + mode).classList.add('active-nav'); updateUI(); }
        function getActiveList() { return currentMode === 'saved' ? myDeck : (currentMode === 'a2' ? a2List : myDeck.concat(a2List).filter(w => w.revisit)); }
        
        function updateUI() {
            const list = getActiveList();
            if(!list.length) { document.getElementById('flashFront').innerText = "Empty"; document.getElementById('flashBack').innerText = "..."; return; }
            const word = list[currentIdx];
            document.getElementById('flashFront').innerText = word.nl;
            document.getElementById('flashBack').innerText = word.en;
            document.querySelectorAll('.cardCountUI').forEach(el => el.innerText = `${currentIdx + 1}/${list.length}`);
            document.getElementById('cardInner').classList.remove('flipped');
            word.revisit ? document.getElementById('revisitBtn').classList.add('revisit-active') : document.getElementById('revisitBtn').classList.remove('revisit-active');
        }

        function toggleRevisit() {
            const list = getActiveList();
            if(list.length) {
                list[currentIdx].revisit = !list[currentIdx].revisit;
                localStorage.setItem('myWords', JSON.stringify(myDeck));
                updateUI();
            }
        }

        function deleteCurrentWord() {
            if(currentMode === 'a2') return alert("Protected list");
            if(myDeck.length) {
                myDeck.splice(currentIdx, 1);
                localStorage.setItem('myWords', JSON.stringify(myDeck));
                currentIdx = 0; updateUI();
            }
        }

        function nextCard() { const l = getActiveList(); if(l.length) { currentIdx = (currentIdx + 1) % l.length; updateUI(); } }
        function prevCard() { const l = getActiveList(); if(l.length) { currentIdx = (currentIdx - 1 + l.length) % l.length; updateUI(); } }

        updateUI();
    </script>
</body>
</html>
