<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>NL In Gang - Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-nav { border-left: 4px solid #4f46e5; background: #f8fafc; color: #4f46e5; font-weight: 800; }
        @media (max-width: 767px) {
            .active-nav { border-left: none; border-bottom: 3px solid #4f46e5; background: #f1f5f9; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-inner { transition: transform 0.4s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; border-radius: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .card-back { transform: rotateY(180deg); background: #4f46e5; color: white; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto p-3">
            <div class="flex flex-col md:flex-row items-center gap-2">
                <div class="flex-1 w-full flex items-center bg-slate-100 rounded-xl border focus-within:border-indigo-400 transition-all overflow-hidden px-3">
                    <span class="text-[10px] font-black text-slate-400 mr-2 uppercase tracking-tighter">NL</span>
                    <input type="text" id="sourceText" oninput="debounceTranslate()" placeholder="Typ hier..." 
                           class="bg-transparent border-none focus:ring-0 text-base font-medium w-full py-3 outline-none">
                    <button onclick="speakInput()" class="text-slate-400 hover:text-indigo-600 p-2"><i class="fas fa-volume-up"></i></button>
                </div>

                <div class="hidden md:block text-slate-300"><i class="fas fa-exchange-alt"></i></div>

                <div class="flex-1 w-full flex items-center bg-indigo-50/50 rounded-xl border border-indigo-100 px-3">
                    <span class="text-[10px] font-black text-indigo-400 mr-2 uppercase tracking-tighter">EN</span>
                    <div id="targetText" class="text-indigo-700 font-bold py-3 text-base italic truncate w-full">...</div>
                    <i class="fas fa-check-circle text-indigo-300 text-sm ml-2" id="saveIndicator"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-white border-b md:border-r overflow-x-auto no-scrollbar md:h-screen md:sticky md:top-[90px]">
            <nav class="flex md:flex-col p-2 md:p-4 gap-1">
                <button id="nav-saved" onclick="showSaved()" class="px-4 py-3 md:w-full md:text-left rounded-xl text-sm shrink-0 flex items-center gap-3 transition-all">
                    <i class="fas fa-layer-group"></i> My Deck
                </button>
                <button id="nav-quiz" onclick="showQuiz()" class="px-4 py-3 md:w-full md:text-left rounded-xl text-sm shrink-0 flex items-center gap-3 transition-all text-orange-600 font-bold">
                    <i class="fas fa-lightbulb"></i> Quiz Mode
                </button>
                <hr class="hidden md:block my-2 border-slate-100">
                <div id="chapterList" class="flex md:flex-col gap-1"></div>
            </nav>
        </aside>

        <main class="flex-grow p-4 md:p-10">
            
            <div id="savedSection">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Your Deck</h2>
                    <p class="text-slate-400 text-sm">Review your translated words as flashcards.</p>
                </div>
                <div class="relative w-full h-80 cursor-pointer mb-8" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                    <div id="cardInner" class="card-inner w-full h-full relative">
                        <div class="card-front bg-white border-2 border-slate-200 shadow-xl">
                            <p id="flashFront" class="text-3xl font-black text-slate-800">...</p>
                        </div>
                        <div class="card-back shadow-2xl">
                            <p id="flashBack" class="text-3xl font-bold italic">...</p>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center gap-8 items-center">
                    <button onclick="prevCard()" class="text-slate-300 hover:text-indigo-600 transition"><i class="fas fa-chevron-left fa-2x"></i></button>
                    <div class="px-6 py-2 bg-white border rounded-full font-bold text-slate-400 text-sm shadow-sm">
                        <span id="cardCounter" class="text-indigo-600">0 / 0</span>
                    </div>
                    <button onclick="nextCard()" class="text-slate-300 hover:text-indigo-600 transition"><i class="fas fa-chevron-right fa-2x"></i></button>
                </div>
            </div>

            <div id="quizSection" class="hidden">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-orange-600 tracking-tight text-center">Practice Quiz</h2>
                    <p class="text-slate-400 text-sm text-center">Type the English translation for the Dutch word shown.</p>
                </div>
                
                <div class="bg-white p-10 rounded-3xl border-2 border-orange-100 shadow-xl text-center max-w-lg mx-auto">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4">Translate this:</span>
                    <h3 id="quizQuestion" class="text-4xl font-black text-slate-800 mb-8">?</h3>
                    <input type="text" id="quizInput" onkeydown="if(event.key === 'Enter') checkQuizAnswer()"
                           class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl py-4 px-6 text-center text-lg font-bold outline-none focus:border-orange-400 transition" 
                           placeholder="Type English...">
                    
                    <div id="quizFeedback" class="mt-6 h-6 font-bold text-sm"></div>
                    
                    <button onclick="checkQuizAnswer()" class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg transition">Submit Answer</button>
                </div>
            </div>

            <div id="chapterSection" class="hidden">
                <div class="text-center py-10 px-6 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                    <h2 id="chapterTitle" class="text-3xl font-black text-slate-800 mb-2">Hoofdstuk 1</h2>
                    <p class="text-slate-500 mb-8 max-w-sm mx-auto text-sm leading-relaxed">Quizlet flashcards are ready. Opens in new tab.</p>
                    <button id="launchBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-2xl font-bold shadow-lg transition active:scale-95">Start Studying</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        const chapterData = {
            1: "218836453", 2: "218836670", 3: "218836794", 4: "218837040", 5: "218837082", 
            6: "218837677", 7: "218837982", 8: "218838021", 9: "218838194", 10: "218838247", 
            11: "218838318", 12: "218838753", 13: "218838787", 14: "218839448", 15: "218840442", 
            16: "218840728", 17: "218840757", 18: "218841206"
        };

        let savedWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let currentIdx = 0;
        let currentQuizWord = null;

        // Init Navigation
        const list = document.getElementById('chapterList');
        for(let i=1; i<=18; i++) {
            const btn = document.createElement('button');
            btn.id = `btn-${i}`;
            btn.className = "px-4 py-3 md:w-full md:text-left rounded-xl text-sm shrink-0 transition-all";
            btn.innerHTML = `<span class="md:hidden">H${i}</span><span class="hidden md:inline">Hoofdstuk ${i}</span>`;
            btn.onclick = () => loadChapter(i);
            list.appendChild(btn);
        }

        function switchView(viewId) {
            document.getElementById('savedSection').classList.add('hidden');
            document.getElementById('chapterSection').classList.add('hidden');
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        }

        function loadChapter(num) {
            switchView('chapterSection');
            document.getElementById('chapterTitle').innerText = `Hoofdstuk ${num}`;
            document.getElementById(`btn-${num}`).classList.add('active-nav');
            const url = `https://quizlet.com/${chapterData[num]}/flashcards`;
            document.getElementById('launchBtn').onclick = () => window.open(url, '_blank');
        }

        function showSaved() {
            switchView('savedSection');
            document.getElementById('nav-saved').classList.add('active-nav');
            updateSavedUI();
        }

        function showQuiz() {
            if(savedWords.length < 1) {
                alert("You need at least 1 saved word to start a quiz!");
                return;
            }
            switchView('quizSection');
            document.getElementById('nav-quiz').classList.add('active-nav');
            generateQuizQuestion();
        }

        // Translation logic
        let timer;
        function debounceTranslate() {
            clearTimeout(timer);
            const output = document.getElementById('targetText');
            document.getElementById('saveIndicator').classList.add('opacity-0');
            output.innerText = "...";
            timer = setTimeout(async () => {
                const text = document.getElementById('sourceText').value.trim();
                if(!text) return;
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=nl|en`);
                    const data = await response = await res.json();
                    const trans = data.responseData.translatedText;
                    output.innerText = trans;
                    document.getElementById('saveIndicator').classList.remove('opacity-0');
                    if(!savedWords.find(w => w.nl.toLowerCase() === text.toLowerCase())) {
                        savedWords.unshift({ nl: text, en: trans });
                        localStorage.setItem('myWords', JSON.stringify(savedWords));
                        updateSavedUI();
                    }
                } catch(e) {}
            }, 800);
        }

        function updateSavedUI() {
            const counter = document.getElementById('cardCounter');
            if(savedWords.length === 0) {
                document.getElementById('flashFront').innerText = "Empty";
                document.getElementById('flashBack').innerText = "...";
                counter.innerText = "0 / 0";
                return;
            }
            const word = savedWords[currentIdx];
            document.getElementById('flashFront').innerText = word.nl;
            document.getElementById('flashBack').innerText = word.en;
            counter.innerText = `${currentIdx + 1} / ${savedWords.length}`;
            document.getElementById('cardInner').classList.remove('flipped');
        }

        // Quiz Logic
        function generateQuizQuestion() {
            const randomWord = savedWords[Math.floor(Math.random() * savedWords.length)];
            currentQuizWord = randomWord;
            document.getElementById('quizQuestion').innerText = randomWord.nl;
            document.getElementById('quizInput').value = "";
            document.getElementById('quizFeedback').innerText = "";
        }

        function checkQuizAnswer() {
            const input = document.getElementById('quizInput').value.trim().toLowerCase();
            const correct = currentQuizWord.en.toLowerCase();
            const feedback = document.getElementById('quizFeedback');
            
            if(input === correct) {
                feedback.innerText = "CORRECT! 🎉";
                feedback.className = "mt-6 h-6 font-bold text-sm text-green-500";
                setTimeout(generateQuizQuestion, 1500);
            } else {
                feedback.innerText = `Incorrect. The answer was "${currentQuizWord.en}"`;
                feedback.className = "mt-6 h-6 font-bold text-sm text-red-500";
            }
        }

        function nextCard() { if(currentIdx < savedWords.length - 1) { currentIdx++; updateSavedUI(); } }
        function prevCard() { if(currentIdx > 0) { currentIdx--; updateSavedUI(); } }
        function speakInput() { 
            const text = document.getElementById('sourceText').value;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'nl-NL'; u.pitch = 1.1;
            window.speechSynthesis.speak(u);
        }

        showSaved();
    </script>
</body>
</html>
