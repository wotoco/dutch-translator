<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutch-English Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-indigo-600 p-8 text-white text-center">
            <h1 class="text-3xl font-bold tracking-tight">Dutch <i class="fas fa-exchange-alt mx-3 text-indigo-300"></i> English</h1>
            <p class="text-indigo-100 mt-2 opacity-90">Powered by Google Voice Pronunciation</p>
        </div>

        <div class="grid md:grid-cols-2 gap-0 divide-y md:divide-y-0 md:divide-x divide-gray-100">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <span class="font-bold text-gray-500 uppercase text-xs tracking-widest">Dutch (Nederlands)</span>
                    <button onclick="speak('dutch')" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-90">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <textarea id="sourceText" placeholder="Typ hier iets..." 
                    class="w-full h-48 resize-none border-none focus:ring-0 text-xl text-gray-800 placeholder-gray-300 bg-transparent"></textarea>
            </div>

            <div class="p-8 bg-gray-50/50">
                <div class="flex justify-between items-center mb-6">
                    <span class="font-bold text-gray-500 uppercase text-xs tracking-widest">English</span>
                    <button onclick="speak('english')" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-90">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div id="targetText" class="w-full h-48 text-xl text-gray-800 font-medium">
                    <span class="text-gray-300 italic">Translation will appear here...</span>
                </div>
            </div>
        </div>

        <div class="p-6 bg-white border-t border-gray-100 flex justify-center">
            <button onclick="handleTranslate()" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-4 rounded-2xl font-bold text-lg transition-all transform hover:-translate-y-1 active:scale-95 shadow-lg shadow-indigo-200">
                Translate Text
            </button>
        </div>
    </div>

    <script>
        // --- TRANSLATION LOGIC ---
        async function handleTranslate() {
            const text = document.getElementById('sourceText').value;
            const outputDiv = document.getElementById('targetText');

            if (!text.trim()) return;

            outputDiv.innerHTML = '<span class="text-indigo-400 animate-pulse">Translating...</span>';

            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=nl|en`);
                const data = await response.json();
                outputDiv.innerText = data.responseData.translatedText;
            } catch (error) {
                outputDiv.innerText = "Error: Could not connect to translator.";
            }
        }

        // --- GOOGLE VOICE PRONUNCIATION ---
        function speak(language) {
            const sourceVal = document.getElementById('sourceText').value;
            const targetVal = document.getElementById('targetText').innerText;
            
            const text = language === 'dutch' ? sourceVal : targetVal;

            if (!text || text.includes("Translation will appear")) return;

            const langCode = language === 'dutch' ? 'nl' : 'en';
            
            // Unofficial Google Translate TTS URL (Option 1)
            const googleTTS = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${encodeURIComponent(text)}`;
            
            const audio = new Audio(googleTTS);
            audio.play().catch(e => {
                console.error("Audio playback failed. This can happen if the text is too long or Google blocks the request.", e);
            });
        }
    </script>
</body>
</html>
