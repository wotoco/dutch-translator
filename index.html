<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>NL In Gang - Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-nav { background: #4f46e5 !important; color: white !important; font-weight: 800; transform: scale(1.05); shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-inner { transition: transform 0.4s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; border-radius: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .card-back { transform: rotateY(180deg); background: #4f46e5; color: white; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto p-3">
            <div class="flex flex-col md:flex-row items-center gap-2">
                <div class="flex-1 w-full flex items-center bg-slate-100 rounded-xl border focus-within:border-indigo-400 transition-all overflow-hidden px-3">
                    <span class="text-[10px] font-black text-slate-400 mr-2 uppercase">NL</span>
                    <input type="text" id="sourceText" oninput="debounceTranslate()" placeholder="Typ hier..." 
                           class="bg-transparent border-none focus:ring-0 text-base font-medium w-full py-3 outline-none">
                    <button onclick="speakInput()" class="text-slate-400 hover:text-indigo-600 p-2"><i class="fas fa-volume-up"></i></button>
                </div>

                <div class="hidden md:block text-slate-300"><i class="fas fa-arrow-right"></i></div>

                <div class="flex-1 w-full flex items-center bg-indigo-50/50 rounded-xl border border-indigo-100 px-3">
                    <span class="text-[10px] font-black text-indigo-400 mr-2 uppercase">EN</span>
                    <div id="targetText" class="text-indigo-700 font-bold py-3 text-base italic truncate w-full">...</div>
                    <i class="fas fa-check-circle text-indigo-300 text-sm ml-2 opacity-0 transition-opacity" id="saveIndicator"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row">
        <aside class="w-full md:w-56 bg-white border-b md:border-r overflow-x-auto no-scrollbar md:h-screen md:sticky md:top-[90px]">
            <nav class="p-4 flex flex-col gap-6">
                <div class="flex flex-row md:flex-col gap-2">
                    <button id="nav-saved" onclick="showSaved()" class="flex-1 p-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 transition-all">
                        <i class="fas fa-layer-group"></i> DECK
                    </button>
                    <button id="nav-quiz" onclick="showQuiz()" class="flex-1 p-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 bg-orange-50 text-orange-600 hover:bg-orange-100 transition-all">
                        <i class="fas fa-lightbulb"></i> QUIZ
                    </button>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Chapters</label>
                    <div id="chapterGrid" class="grid grid-cols-6 md:grid-cols-3 lg:grid-cols-4 gap-2">
                        </div>
                </div>
            </nav>
        </aside>

        <main class="flex-grow p-4 md:p-10">
            <div id="savedSection">
                <h2 class="text-2xl font-black text-slate-800 mb-6 tracking-tight">Your Cards</h2>
                <div class="relative w-full h-80 cursor-pointer mb-8" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                    <div id="cardInner" class="card-inner w-full h-full relative">
                        <div class="card-front bg-white border-2 border-slate-200 shadow-xl">
                            <p id="flashFront" class="text-3xl font-black text-slate-800">...</p>
                        </div>
                        <div class="card-back shadow-2xl">
                            <p id="flashBack" class="text-3xl font-bold italic">...</p>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center gap-8 items-center">
                    <button onclick="prevCard()" class="text-slate-300 hover:text-indigo-600 transition"><i class="fas fa-chevron-left fa-2x"></i></button>
                    <div class="px-6 py-2 bg-white border rounded-full font-bold text-slate-400 text-sm"><span id="cardCounter">0/0</span></div>
                    <button onclick="nextCard()" class="text-slate-300 hover:text-indigo-600 transition"><i class="fas fa-chevron-right fa-2x"></i></button>
                </div>
            </div>

            <div id="quizSection" class="hidden">
                <h2 class="text-2xl font-black text-orange-600 mb-6 text-center">Quiz Mode</h2>
                <div class="bg-white p-8 rounded-3xl border-2 border-orange-100 shadow-xl text-center max-w-sm mx-auto">
                    <h3 id="quizQuestion" class="text-3xl font-black text-slate-800 mb-6">?</h3>
                    <input type="text" id="quizInput" onkeydown="if(event.key === 'Enter') checkQuizAnswer()"
                           class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-3 px-4 text-center font-bold mb-4 outline-none focus:border-orange-400" 
                           placeholder="English...">
                    <div id="quizFeedback" class="h-4 text-xs font-bold mb-4"></div>
                    <button onclick="checkQuizAnswer()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold transition active:scale-95">Check</button>
                </div>
            </div>

            <div id="chapterSection" class="hidden text-center py-10 bg-white rounded-3xl border-2 border-dashed">
                <h2 id="chapterTitle" class="text-3xl font-black text-slate-800 mb-4">Hoofdstuk 1</h2>
                <button id="launchBtn" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold shadow-lg transition active:scale-95">Open Quizlet Flashcards</button>
            </div>
        </main>
    </div>

    <script>
        const chapterData = {
            1: "218836453", 2: "218836670", 3: "218836794", 4: "218837040", 5: "218837082", 
            6: "218837677", 7: "218837982", 8: "218838021", 9: "218838194", 10: "218838247", 
            11: "218838318", 12: "218838753", 13: "218838787", 14: "218839448", 15: "218840442", 
            16: "218840728", 17: "218840757", 18: "218841206"
        };

        let savedWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let currentIdx = 0;
        let currentQuizWord = null;

        // Build Numbers Only Grid
        const grid = document.getElementById('chapterGrid');
        for(let i=1; i<=18; i++) {
            const btn = document.createElement('button');
            btn.id = `btn-${i}`;
            btn.className = "aspect-square flex items-center justify-center rounded-lg text-xs font-bold bg-slate-50 border hover:bg-white transition-all";
            btn.innerText = i;
            btn.onclick = () => loadChapter(i);
            grid.appendChild(btn);
        }

        function switchView(viewId) {
            ['savedSection', 'chapterSection', 'quizSection'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.querySelectorAll('nav button, #chapterGrid button').forEach(b => b.classList.remove('active-nav'));
        }

        function loadChapter(num) {
            switchView('chapterSection');
            document.getElementById('chapterTitle').innerText = `Hoofdstuk ${num}`;
            document.getElementById(`btn-${num}`).classList.add('active-nav');
            const url = `https://quizlet.com/${chapterData[num]}/flashcards`;
            document.getElementById('launchBtn').onclick = () => window.open(url, '_blank');
        }

        function showSaved() {
            switchView('savedSection');
            document.getElementById('nav-saved').classList.add('active-nav');
            updateSavedUI();
        }

        function showQuiz() {
            if(savedWords.length < 1) { alert("Add words first!"); return; }
            switchView('quizSection');
            document.getElementById('nav-quiz').classList.add('active-nav');
            generateQuizQuestion();
        }

        let timer;
        function debounceTranslate() {
            clearTimeout(timer);
            const output = document.getElementById('targetText');
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('opacity-0');
            output.innerText = "...";
            timer = setTimeout(async () => {
                const text = document.getElementById('sourceText').value.trim();
                if(!text) return;
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=nl|en`);
                    const data = await res.json();
                    const trans = data.responseData.translatedText;
                    output.innerText = trans;
                    indicator.classList.remove('opacity-0');
                    if(!savedWords.find(w => w.nl.toLowerCase() === text.toLowerCase())) {
                        savedWords.unshift({ nl: text, en: trans });
                        localStorage.setItem('myWords', JSON.stringify(savedWords));
                        updateSavedUI();
                    }
                } catch(e) {}
            }, 800);
        }

        function updateSavedUI() {
            if(savedWords.length === 0) {
                document.getElementById('flashFront').innerText = "Empty";
                document.getElementById('flashBack').innerText = "...";
                document.getElementById('cardCounter').innerText = "0/0";
                return;
            }
            const word = savedWords[currentIdx];
            document.getElementById('flashFront').innerText = word.nl;
            document.getElementById('flashBack').innerText = word.en;
            document.getElementById('cardCounter').innerText = `${currentIdx + 1}/${savedWords.length}`;
            document.getElementById('cardInner').classList.remove('flipped');
        }

        function generateQuizQuestion() {
            currentQuizWord = savedWords[Math.floor(Math.random() * savedWords.length)];
            document.getElementById('quizQuestion').innerText = currentQuizWord.nl;
            document.getElementById('quizInput').value = "";
            document.getElementById('quizFeedback').innerText = "";
        }

        function checkQuizAnswer() {
            const input = document.getElementById('quizInput').value.trim().toLowerCase();
            const correct = currentQuizWord.en.toLowerCase();
            const f = document.getElementById('quizFeedback');
            if(input === correct) {
                f.innerText = "CORRECT!"; f.className = "text-green-500 mb-4";
                setTimeout(generateQuizQuestion, 1200);
            } else {
                f.innerText = `Try again! Hint: Starts with "${correct.charAt(0)}"`;
                f.className = "text-red-400 mb-4";
            }
        }

        function nextCard() { if(currentIdx < savedWords.length - 1) { currentIdx++; updateSavedUI(); } }
        function prevCard() { if(currentIdx > 0) { currentIdx--; updateSavedUI(); } }
        function speakInput() { 
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(document.getElementById('sourceText').value);
            u.lang = 'nl-NL'; u.pitch = 1.1;
            window.speechSynthesis.speak(u);
        }

        showSaved();
    </script>
</body>
</html>
