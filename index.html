<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dutch-English Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Dutch <i class="fas fa-bolt mx-2 text-yellow-300"></i> English</h1>
            <p class="text-indigo-100 text-sm">Translating live as you type...</p>
        </div>

        <div class="grid md:grid-cols-2 gap-0 divide-y md:divide-y-0 md:divide-x divide-gray-100">
            <div class="p-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-400 uppercase text-xs">Dutch</span>
                    <button onclick="speak('nl')" class="text-indigo-600 hover:bg-indigo-50 w-10 h-10 rounded-full transition">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <textarea id="sourceText" oninput="debounceTranslate()" placeholder="Typ hier..." 
                    class="w-full h-40 resize-none border-none focus:ring-0 text-xl text-gray-800"></textarea>
            </div>

            <div class="p-8 bg-gray-50/50">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-400 uppercase text-xs">English</span>
                    <button onclick="speak('en')" class="text-indigo-600 hover:bg-indigo-50 w-10 h-10 rounded-full transition">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div id="targetText" class="w-full h-40 text-xl text-gray-800 font-medium"></div>
            </div>
        </div>
    </div>

    <script>
        let typingTimer;
        const doneTypingInterval = 500; // Wait 500ms after user stops typing to call API

        // 1. Real-time Trigger
        function debounceTranslate() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(performTranslation, doneTypingInterval);
        }

        async function performTranslation() {
            const text = document.getElementById('sourceText').value;
            const outputDiv = document.getElementById('targetText');

            if (!text.trim()) {
                outputDiv.innerText = "";
                return;
            }

            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=nl|en`);
                const data = await response.json();
                outputDiv.innerText = data.responseData.translatedText;
            } catch (error) {
                console.error("Translation error");
            }
        }

        // 2. Fixed Sound Function
        function speak(lang) {
            const sourceText = document.getElementById('sourceText').value;
            const targetText = document.getElementById('targetText').innerText;
            const textToSay = (lang === 'nl') ? sourceText : targetText;

            if (!textToSay) return;

            // Using the 'translate_tts' with 'client=tw-ob' which is most reliable for browsers
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(textToSay)}&tl=${lang}&client=tw-ob`;
            
            const audio = new Audio();
            audio.src = url;
            audio.play().catch(err => {
                alert("Please click the page once first to enable audio!");
                console.error(err);
            });
