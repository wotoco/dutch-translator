<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Dutch Everyday - Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .active-nav { background: #4f46e5 !important; color: white !important; font-weight: 700; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .card-inner { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            backface-visibility: hidden; 
            position: absolute; 
            width: 100%; height: 100%; 
            border-radius: 2rem; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 2rem; text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .card-back { transform: rotateY(180deg); background: #4f46e5; color: white; }
        
        /* Inner Card Counter */
        .inner-counter {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.05);
            color: #94a3b8;
        }
        .card-back .inner-counter {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }

        .search-row { height: 56px; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .search-row:focus-within { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .label-tag { min-width: 45px; text-align: center; font-size: 10px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
        
        .conj-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .conj-row:last-child { border-bottom: none; }
        .speak-small { color: #cbd5e1; cursor: pointer; transition: color 0.2s; font-size: 0.8rem; margin-left: 8px; }
        .speak-small:hover { color: #4f46e5; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto p-4 flex flex-col gap-3">
            <div class="flex flex-col lg:flex-row items-center gap-4">
                <div class="shrink-0 flex items-center gap-2 mr-2">
                    <span class="text-2xl drop-shadow-sm">🇳🇱</span>
                    <h1 class="text-xl font-extrabold tracking-tighter italic text-slate-800">Dutch<span class="text-indigo-600">Everyday</span></h1>
                </div>

                <div class="flex-1 w-full flex items-center bg-slate-50 rounded-xl px-3 search-row">
                    <span class="label-tag text-slate-400">Dict</span>
                    <input type="text" id="sourceText" oninput="debounceTranslate()" placeholder="Search word..." class="bg-transparent border-none focus:ring-0 text-base font-semibold w-full px-2 outline-none">
                    <button onclick="speakText(document.getElementById('sourceText').value, isNlToEn ? 'nl' : 'en')" class="text-slate-400 hover:text-indigo-600 p-2 transition">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>

                <button onclick="swapLanguages()" class="bg-white border w-10 h-10 rounded-full flex items-center justify-center text-indigo-600 hover:bg-indigo-50 shadow-sm active:scale-90 transition-all">
                    <i class="fas fa-exchange-alt"></i>
                </button>

                <div class="flex-1 w-full flex items-center bg-indigo-50/50 rounded-xl px-3 border border-indigo-100 search-row">
                    <span class="label-tag text-indigo-400">Eng</span>
                    <div id="targetText" class="text-indigo-700 font-bold px-2 text-base italic truncate w-full">...</div>
                    <button onclick="speakText(document.getElementById('targetText').innerText, isNlToEn ? 'en' : 'nl')" class="text-indigo-300 hover:text-indigo-600 p-2">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <i class="fas fa-check-circle text-indigo-400 text-sm ml-1 opacity-0 transition-opacity" id="saveIndicator"></i>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row items-center gap-4">
                <div class="hidden lg:block shrink-0 mr-2" style="width: 175px;"></div> 
                <div class="flex-1 w-full flex items-center bg-slate-50 rounded-xl px-3 search-row">
                    <span class="label-tag text-slate-400">Verb</span>
                    <input type="text" id="verbInput" oninput="debounceConjugate()" placeholder="Type verb or stem (e.g. 'krijg')..." class="bg-transparent border-none focus:ring-0 text-sm font-semibold w-full px-2 outline-none">
                    <i class="fas fa-terminal text-slate-300 mr-2"></i>
                </div>
                <div class="hidden lg:block shrink-0" style="width: calc(50% + 56px);"></div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-60 bg-white border-r border-slate-100 p-4 sticky top-[180px] h-fit">
            <nav class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <button id="nav-saved" onclick="showSaved()" class="w-full p-3 rounded-xl text-sm font-bold flex items-center gap-3 transition-all active-nav">
                        <i class="fas fa-layer-group w-5"></i> My Deck
                    </button>
                    <button id="nav-quiz" onclick="showQuiz()" class="w-full p-3 rounded-xl text-sm font-bold flex items-center gap-3 transition-all text-slate-600 hover:bg-slate-50">
                        <i class="fas fa-lightbulb w-5 text-orange-400"></i> Practice Quiz
                    </button>
                </div>
                <div class="pt-4 border-t border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-4">Chapters</label>
                    <div id="chapterGrid" class="grid grid-cols-4 gap-2"></div>
                </div>
                <div class="pt-4 border-t border-slate-100">
                    <button onclick="exportWords()" class="w-full text-left p-2 rounded-lg text-xs font-semibold text-slate-600 hover:bg-slate-50 flex items-center gap-2">
                        <i class="fas fa-download"></i> Export Words
                    </button>
                    <button onclick="clearAllWords()" class="w-full text-left p-2 rounded-lg text-xs font-semibold text-red-500 hover:bg-red-50 flex items-center gap-2">
                        <i class="fas fa-trash-alt"></i> Reset Deck
                    </button>
                </div>
            </nav>
        </aside>

        <main class="flex-grow p-6 lg:p-10">
            <div id="conjugationBox" class="hidden mb-10 bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-sm flex items-center gap-2 text-slate-800 uppercase tracking-tight">
                        <i class="fas fa-book-open text-indigo-500"></i> Conjugation: <span id="verbName" class="text-indigo-600 lowercase italic ml-1">...</span>
                        <button onclick="speakText(document.getElementById('verbName').innerText, 'nl')" class="text-indigo-300 hover:text-indigo-500 ml-2">
                            <i class="fas fa-volume-up text-xs"></i>
                        </button>
                    </h3>
                    <button onclick="document.getElementById('conjugationBox').classList.add('hidden')" class="text-slate-300 hover:text-slate-500">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <p class="text-[10px] font-extrabold text-slate-400 mb-4 uppercase">Present Tense (OTT)</p>
                        <div id="presTense" class="bg-slate-50/50 rounded-xl px-4 py-2"></div>
                    </div>
                    <div>
                        <p class="text-[10px] font-extrabold text-slate-400 mb-4 uppercase">Past Tense (OVT)</p>
                        <div id="pastTense" class="bg-slate-50/50 rounded-xl px-4 py-2"></div>
                    </div>
                </div>
            </div>

            <div id="savedSection">
                <div class="mb-8 flex flex-col">
                    <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Personal Deck</h2>
                    <p class="text-slate-400 text-sm">Review your saved vocabulary</p>
                </div>
                <div class="relative max-w-xl mx-auto h-80 mb-10">
                    <button onclick="deleteCurrentWord()" class="absolute -top-3 -right-3 z-10 bg-white border border-slate-200 text-red-500 w-9 h-9 rounded-full shadow-md hover:bg-red-50 flex items-center justify-center transition">
                        <i class="fas fa-trash-alt text-sm"></i>
                    </button>
                    <div class="w-full h-full cursor-pointer" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                        <div id="cardInner" class="card-inner w-full h-full relative">
                            <div class="card-front bg-white shadow-xl">
                                <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-6">Dutch Word</span>
                                <p id="flashFront" class="text-4xl font-extrabold text-slate-800">...</p>
                                <button onclick="event.stopPropagation(); speakText(document.getElementById('flashFront').innerText, 'nl')" class="mt-8 w-12 h-12 rounded-full bg-slate-50 text-indigo-500 flex items-center justify-center hover:bg-indigo-50 transition"><i class="fas fa-volume-up"></i></button>
                                <div class="inner-counter"><span class="cardCountUI">0/0</span></div>
                            </div>
                            <div class="card-back shadow-xl shadow-indigo-200/50">
                                <span class="text-[10px] font-bold text-indigo-200 uppercase tracking-widest mb-6">Translation</span>
                                <p id="flashBack" class="text-4xl font-bold italic">...</p>
                                <button onclick="event.stopPropagation(); speakText(document.getElementById('flashBack').innerText, 'en')" class="mt-8 w-12 h-12 rounded-full bg-white/20 text-white flex items-center justify-center hover:bg-white/30 transition"><i class="fas fa-volume-up"></i></button>
                                <div class="inner-counter"><span class="cardCountUI">0/0</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center gap-10">
                    <button onclick="prevCard()" class="w-14 h-14 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition"><i class="fas fa-chevron-left fa-lg"></i></button>
                    <button onclick="nextCard()" class="w-14 h-14 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition"><i class="fas fa-chevron-right fa-lg"></i></button>
                </div>
            </div>

            <div id="quizSection" class="hidden"></div>
            <div id="chapterSection" class="hidden"></div>
        </main>
    </div>

    <script>
        const chapterData = { 1: "218836453", 2: "218836670", 3: "218836794", 4: "218837040", 5: "218837082", 6: "218837677", 7: "218837982", 8: "218838021", 9: "218838194", 10: "218838247", 11: "218838318", 12: "218838753", 13: "218838787", 14: "218839448", 15: "218840442", 16: "218840728", 17: "218840757", 18: "218841206" };
        let savedWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let currentIdx = 0; let isNlToEn = true;

        const grid = document.getElementById('chapterGrid');
        for(let i=1; i<=18; i++) {
            const btn = document.createElement('button');
            btn.id = `btn-${i}`;
            btn.className = "h-10 rounded-lg text-xs font-bold bg-white border border-slate-100 hover:border-indigo-300 transition-all text-slate-500 shadow-sm";
            btn.innerText = i; btn.onclick = () => loadChapter(i); grid.appendChild(btn);
        }

        // --- UPDATED FEMALE VOICE LOGIC ---
        function speakText(text, lang) {
            if(!text || text === "..." || text === "") return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            if (lang === 'nl') {
                const df = voices.find(v => v.lang.startsWith('nl') && (v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Laura') || v.name.includes('Ellen')));
                if (df) u.voice = df; 
                u.lang = 'nl-NL'; u.pitch = 1.25;
            } else {
                const ef = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Samantha') || v.name.includes('Victoria')));
                if (ef) u.voice = ef; 
                u.lang = 'en-US'; u.pitch = 1.15;
            }
            u.rate = 0.85; window.speechSynthesis.speak(u);
        }

        function smartConjugate(input) {
            let text = input.toLowerCase().trim();
            if (!text || text.length < 2) {
                document.getElementById('conjugationBox').classList.add('hidden');
                return;
            }
            let infinitive = text.endsWith('en') ? text : text + 'en';
            let stem = text.endsWith('en') ? text.slice(0, -2) : text;
            const pres = [{ p: 'Ik', v: stem }, { p: 'Jij/U', v: stem + 't' }, { p: 'Hij/Zij', v: stem + 't' }, { p: 'Wij', v: infinitive }];
            const past = [{ p: 'Ik/Hij', v: stem + 'te/de' }, { p: 'Wij', v: stem + 'ten/den' }];
            document.getElementById('verbName').innerText = infinitive;
            const mapConj = (arr) => arr.map(r => `<div class="conj-row"><span>${r.p} <span class="font-bold text-indigo-600 ml-1">${r.v}</span></span><i class="fas fa-volume-up speak-small" onclick="speakText('${r.v}', 'nl')"></i></div>`).join('');
            document.getElementById('presTense').innerHTML = mapConj(pres);
            document.getElementById('pastTense').innerHTML = mapConj(past);
            document.getElementById('conjugationBox').classList.remove('hidden');
        }

        let verbTimer;
        function debounceConjugate() {
            clearTimeout(verbTimer);
            verbTimer = setTimeout(() => smartConjugate(document.getElementById('verbInput').value), 400);
        }

        let timer;
        function debounceTranslate() {
            clearTimeout(timer);
            const output = document.getElementById('targetText');
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('opacity-0');
            output.innerText = "...";
            timer = setTimeout(async () => {
                const text = document.getElementById('sourceText').value.trim();
                if(!text) { document.getElementById('conjugationBox').classList.add('hidden'); return; }
                if(isNlToEn && text.length >= 4) smartConjugate(text);
                const sl = isNlToEn ? 'nl' : 'en'; const tl = isNlToEn ? 'en' : 'nl';
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
                try {
                    const res = await fetch(url); const data = await res.json();
                    const trans = data[0][0][0]; output.innerText = trans;
                    const nlVal = (isNlToEn ? text : trans).toLowerCase().trim();
                    const enVal = (isNlToEn ? trans : text).trim();
                    if(!savedWords.some(w => w.nl.toLowerCase().trim() === nlVal)) {
                        indicator.classList.remove('opacity-0');
                        savedWords.unshift({ nl: nlVal, en: enVal });
                        localStorage.setItem('myWords', JSON.stringify(savedWords));
                        updateSavedUI();
                    }
                } catch(e) { output.innerText = "Error"; }
            }, 700);
        }

        function swapLanguages() {
            isNlToEn = !isNlToEn;
            document.getElementById('label-source').innerText = isNlToEn ? 'Dict' : 'Eng';
            document.getElementById('label-target').innerText = isNlToEn ? 'Eng' : 'Dict';
            document.getElementById('sourceText').value = '';
            document.getElementById('targetText').innerText = '...';
        }

        function switchView(viewId) {
            ['savedSection', 'chapterSection', 'quizSection'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.querySelectorAll('nav button, #chapterGrid button').forEach(b => b.classList.remove('active-nav'));
        }

        function loadChapter(num) {
            switchView('chapterSection');
            document.getElementById(`btn-${num}`).classList.add('active-nav');
            window.open(`https://quizlet.com/${chapterData[num]}/flashcards`, '_blank');
        }

        function showSaved() {
            switchView('savedSection');
            document.getElementById('nav-saved').classList.add('active-nav');
            updateSavedUI();
        }

        function updateSavedUI() {
            const countLabels = document.querySelectorAll('.cardCountUI');
            if(savedWords.length === 0) {
                document.getElementById('flashFront').innerText = "Deck Empty";
                document.getElementById('flashBack').innerText = "Search words to save";
                countLabels.forEach(el => el.innerText = "0/0"); return;
            }
            const word = savedWords[currentIdx];
            document.getElementById('flashFront').innerText = word.nl;
            document.getElementById('flashBack').innerText = word.en;
            countLabels.forEach(el => el.innerText = `${currentIdx + 1}/${savedWords.length}`);
            document.getElementById('cardInner').classList.remove('flipped');
        }

        function nextCard() { if(currentIdx < savedWords.length - 1) { currentIdx++; updateSavedUI(); } }
        function prevCard() { if(currentIdx > 0) { currentIdx--; updateSavedUI(); } }
        
        function deleteCurrentWord() {
            if(savedWords.length === 0) return;
            if(confirm(`Delete "${savedWords[currentIdx].nl}"?`)) {
                savedWords.splice(currentIdx, 1);
                localStorage.setItem('myWords', JSON.stringify(savedWords));
                currentIdx = Math.max(0, currentIdx - 1);
                updateSavedUI();
            }
        }

        function exportWords() {
            if(savedWords.length === 0) return;
            const content = savedWords.map(w => `${w.nl.toUpperCase()} : ${w.en}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `DutchEveryday_Deck.txt`; a.click();
        }

        function clearAllWords() {
            if(confirm("Delete ALL words permanently?")) {
                savedWords = []; localStorage.setItem('myWords', "[]"); currentIdx = 0; updateSavedUI();
            }
        }

        // Initialize voices
        window.speechSynthesis.onvoiceschanged = () => {};

        showSaved();
    </script>
</body>
</html>
