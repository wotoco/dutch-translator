<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dutch Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold italic">DeepL <span class="text-indigo-400">Pro</span></h1>
                <p class="text-xs text-slate-400">Formal Dutch-English Dictionary Integration</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs font-semibold uppercase text-slate-400">Formality:</span>
                <select id="formality" onchange="performTranslation()" class="bg-slate-800 text-xs border-none rounded-lg p-1 text-white focus:ring-1 focus:ring-indigo-500">
                    <option value="default">Default</option>
                    <option value="formal">Formal</option>
                    <option value="informal">Informal</option>
                </select>
            </div>
        </div>

        <div class="grid md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-gray-100">
            <div class="p-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-400 text-xs tracking-widest">NEDERLANDS</span>
                    <button onclick="speak('nl-NL')" class="hover:text-indigo-600 transition"><i class="fas fa-volume-up"></i></button>
                </div>
                <textarea id="sourceText" oninput="debounceTranslate()" placeholder="Voer tekst in..." 
                    class="w-full h-44 resize-none border-none focus:ring-0 text-xl text-gray-800"></textarea>
            </div>

            <div class="p-8 bg-gray-50/50">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-400 text-xs tracking-widest">ENGLISH</span>
                    <button onclick="speak('en-US')" class="hover:text-indigo-600 transition"><i class="fas fa-volume-up"></i></button>
                </div>
                <div id="targetText" class="w-full h-44 text-xl text-gray-800 font-medium overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR DEEPL API KEY HERE
        const DEEPL_API_KEY = 'YOUR_API_KEY_HERE'; 

        let typingTimer;
        
        function debounceTranslate() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(performTranslation, 500);
        }

        async function performTranslation() {
            const text = document.getElementById('sourceText').value;
            const outputDiv = document.getElementById('targetText');
            const formality = document.getElementById('formality').value;

            if (!text.trim()) { outputDiv.innerText = ""; return; }
            if (DEEPL_API_KEY === 'YOUR_API_KEY_HERE') {
                outputDiv.innerHTML = '<span class="text-red-500 text-sm italic">Add your DeepL API key in the code to start.</span>';
                return;
            }

            try {
                // DeepL API requires a specific POST format
                const response = await fetch(`https://api-free.deepl.com/v2/translate`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `DeepL-Auth-Key ${DEEPL_API_KEY}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        'text': text,
                        'target_lang': 'EN-US',
                        'source_lang': 'NL',
                        'formality': formality
                    })
                });

                const data = await response.json();
                outputDiv.innerText = data.translations[0].text;
            } catch (error) {
                console.error("DeepL Error:", error);
            }
        }

        function speak(langCode) {
            const text = (langCode === 'nl-NL') 
                ? document.getElementById('sourceText').value 
                : document.getElementById('targetText').innerText;

            if (!text) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
